<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  var hash = window.location.hash;
  var search = window.location.search;
  var params = '';
  if (hash && hash.length > 1) {
    params = '?' + hash.substring(1);
  } else if (search) {
    params = search;
  }
  if (params) {
    window.location.href = 'com.tapa.korean://reset-password' + params;
  }
</script>
<p>앱으로 이동 중...</p>
</body>
</html>
