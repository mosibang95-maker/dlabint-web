<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TAPA 비밀번호 재설정</title>
  <style>
    body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#FFF5F2}
    .box{text-align:center;padding:40px 20px}
    p{color:#2d1210;font-size:16px;font-weight:bold}
    .err{color:#ef4444}
  </style>
</head>
<body>
<div class="box">
  <p id="msg">비밀번호 재설정 링크 확인 중...</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var msg = document.getElementById('msg');
var p = new URLSearchParams(window.location.search);
var token = p.get('token');
var email = p.get('email');
var error = p.get('error');

if (error) {
  msg.className = 'err';
  msg.textContent = '링크가 만료되었습니다. 앱에서 다시 요청해주세요.';
} else if (token && email) {
  var client = supabase.createClient(
    'https://zlzteilnrjpyhvvbmnnq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsenRlaWxucmpweWh2dmJtbm5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDAyNzMsImV4cCI6MjA5MjExNjI3M30.55UjvNVyVvdXcB-M7Q1WVnbTdteVIVj9lmjckCxqfYI'
  );
  client.auth.verifyOtp({ email: email, token: token, type: 'recovery' })
    .then(function(r) {
      if (r.error || !r.data.session) {
        msg.className = 'err';
        msg.textContent = '링크가 만료되었습니다. 앱에서 다시 요청해주세요.';
      } else {
        var s = r.data.session;
        msg.textContent = '앱으로 이동 중...';
        window.location.href = 'com.tapa.korean://reset-password?access_token=' + s.access_token + '&refresh_token=' + s.refresh_token;
      }
    });
} else {
  msg.textContent = '잘못된 링크입니다.';
}
</script>
</body>
</html>
